# .github/workflows/wheels.yml — cibuildwheel with Windows support added.
# Merges into the project's existing workflow if one exists; otherwise new.
name: Build wheels

on:
  push:
    tags: [v*]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.os }} / ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["cp310", "cp311", "cp312"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ninja

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: ${{ matrix.python }}-*
          CIBW_SKIP: "*-musllinux_* *-win32"
          CIBW_BEFORE_BUILD: "pip install --upgrade cmake maturin"
          CIBW_ENVIRONMENT_WINDOWS: 'CMAKE_GENERATOR="Ninja"'
          CIBW_BUILD_VERBOSITY: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl
